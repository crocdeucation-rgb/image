<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아라온스쿨 리드 현황</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
body { background: #f8f9fa; padding: 0; }
.layout { display: grid; grid-template-columns: minmax(380px, 1fr) minmax(0, 1.5fr); gap: 16px; max-width: 1600px; margin: 0 auto; padding: 8px 14px; }
@media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }

/* === 좌측 (컴팩트) === */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.updated { font-size: 10px; color: #999; margin-top: 2px; }
.refresh { font-size: 11px; padding: 3px 9px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; color: #555; }
.tabs { display: flex; gap: 5px; margin-bottom: 10px; }
.tab { padding: 4px 11px; font-size: 11px; border-radius: 16px; border: 1px solid #ddd; background: white; color: #666; cursor: pointer; }
.tab.active { background: #1a73e8; color: white; border-color: #1a73e8; }
.section-label { font-size: 10px; color: #999; margin: 12px 0 6px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
.section-label .badge { font-size: 9px; padding: 1px 6px; border-radius: 8px; background: #eef2f7; color: #5a6a7a; font-weight: 600; }
.section-label .badge.pay { background: #f3e8ff; color: #7c3aed; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.card { background: white; border-radius: 8px; padding: 10px 6px; text-align: center; border: 1px solid #eee; }
.clabel { font-size: 10px; color: #888; margin-bottom: 4px; }
.cval { font-size: 19px; font-weight: 600; color: #1a1a1a; }
.cval.blue { color: #1a73e8; }
.cval.green { color: #0f9d58; }
.cval.red { color: #ea4335; }
.cval.amber { color: #f4b400; }
.cval.purple { color: #9333ea; }
.cval.sm { font-size: 15px; }

/* === 우측 캘린더 === */
.cal-panel { background: white; border: 1px solid #eee; border-radius: 8px; padding: 14px; }
.cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
.cal-title { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.cal-range { font-size: 10px; color: #999; }

/* 캘린더 그리드 */
.cal-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
.cal-week:last-child { margin-bottom: 0; }
.cal-day { background: #fafbfc; border: 1px solid #eef0f3; border-radius: 6px; padding: 6px; min-height: 90px; display: flex; flex-direction: column; }
.cal-day.today { background: #e8f0fe; border-color: #1a73e8; }
.cal-day.weekend { background: #fdf6f6; }
.cal-day.weekend.today { background: #e8f0fe; }
.cal-day.past { opacity: 0.4; }
.cal-day.other-month { opacity: 0.3; background: #fafbfc; }
.cal-day.other-month .cal-date .num { color: #bbb; }

.cal-date { font-size: 10px; color: #888; margin-bottom: 4px; font-weight: 600; display: flex; justify-content: space-between; align-items: baseline; }
.cal-date .num { font-size: 13px; color: #333; }
.cal-day.today .cal-date .num { color: #1a73e8; }
.cal-day.weekend .cal-date .num { color: #ea4335; }
.cal-day.weekend.today .cal-date .num { color: #1a73e8; }
.cal-date .dow { font-size: 9px; color: #aaa; }

.cal-event { font-size: 10px; padding: 2px 4px; margin-bottom: 2px; background: white; border-left: 2px solid #0f9d58; border-radius: 3px; line-height: 1.3; }
.cal-events-wrap { display: contents; }
.cal-event.order { border-left-color: #9333ea; }
.cal-event-time { font-weight: 600; color: #0f9d58; font-size: 9px; }
.cal-event-time.notime { color: #aaa; font-weight: 400; }
.cal-event-tag { font-weight: 600; color: #9333ea; font-size: 9px; }
.cal-event-name { color: #333; }
.cal-event-grade { color: #999; font-size: 9px; }
.cal-event-sales { color: #9333ea; font-size: 9px; font-weight: 600; }

/* === 모바일 리스트 모드 === */
@media (max-width: 700px) {
  .layout { padding: 6px 8px; }
  
  /* 캘린더 그리드 → 세로 리스트로 전환 */
  .cal-week { display: block; margin-bottom: 0; }
  .cal-day { 
    min-height: 0; 
    margin-bottom: 6px; 
    padding: 8px 10px; 
    flex-direction: row; 
    align-items: flex-start; 
    gap: 10px; 
  }
  
  /* 일정 없는 날 + 다른 달 날짜 숨김 (모바일) */
  .cal-day.empty { display: none; }
  .cal-day.other-month { display: none; }
  
  .cal-date { 
    margin-bottom: 0; 
    flex-direction: column; 
    min-width: 44px; 
    align-items: center; 
    text-align: center; 
    flex-shrink: 0;
  }
  .cal-date .num { font-size: 14px; }
  .cal-date .dow { font-size: 10px; margin-top: 2px; }
  
  .cal-events-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .cal-event { 
    font-size: 12px; 
    padding: 5px 8px; 
    margin-bottom: 0; 
    display: flex; 
    align-items: center; 
    gap: 6px; 
    flex-wrap: wrap;
  }
  .cal-event-time, .cal-event-tag { font-size: 11px; }
  .cal-event-grade { display: inline; margin-left: 4px; }
  .cal-event-sales { display: inline; margin-left: auto; }
  
  /* 좌측 카드도 살짝 크게 (모바일 가독성) */
  .cval { font-size: 22px; }
  .cval.sm { font-size: 17px; }
}
</style>
</head>
<body>

<div class="layout">

<!-- 좌측: 통계 -->
<div>

<div class="header">
  <div>
    <div class="title">아라온스쿨 리드 현황</div>
    <div class="updated" id="updated">불러오는 중...</div>
  </div>
  <button class="refresh" onclick="loadAll()">새로고침</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab(0)">오늘</button>
  <button class="tab" onclick="setTab(1)">최근 7일</button>
  <button class="tab" onclick="setTab(2)">이번 달</button>
  <button class="tab" onclick="setTab(3)">전체</button>
</div>

<div class="section-label">📥 유입 현황 <span class="badge">신청일 기준</span></div>
<div class="grid-3">
  <div class="card"><div class="clabel">총 유입</div><div class="cval blue" id="v0">-</div></div>
  <div class="card"><div class="clabel">방문예정</div><div class="cval amber" id="v1">-</div></div>
  <div class="card"><div class="clabel">이탈</div><div class="cval red" id="v2">-</div></div>
</div>

<div class="section-label">💰 신규 오더 <span class="badge pay">결제일 기준</span></div>
<div class="grid-2">
  <div class="card"><div class="clabel">오더 건수</div><div class="cval green" id="v3">-</div></div>
  <div class="card"><div class="clabel">전환율 (이번 달)</div><div class="cval sm" id="rate-month">-</div></div>
</div>

<div class="section-label">매출 <span class="badge pay">결제일 기준</span></div>
<div class="grid-3">
  <div class="card"><div class="clabel">이번 달</div><div class="cval purple sm" id="sales-month">-</div></div>
  <div class="card"><div class="clabel">지난 달</div><div class="cval sm" id="sales-last">-</div></div>
  <div class="card"><div class="clabel">누적</div><div class="cval sm" id="sales-all">-</div></div>
</div>

<div class="section-label">리드 출처 <span class="badge">이번달 / 전체</span></div>
<div class="grid-2">
  <div class="card"><div class="clabel">아라위키</div><div class="cval blue sm" id="src-ara">-</div></div>
  <div class="card"><div class="clabel">오디플랜</div><div class="cval green sm" id="src-odi">-</div></div>
</div>

</div>

<!-- 우측: 2주 캘린더 -->
<div class="cal-panel">
  <div class="cal-head">
    <div class="cal-title">📅 방문 · 오더</div>
    <div style="display:flex; gap:8px; align-items:center;">
      <span style="font-size:9px; color:#0f9d58;">● 방문</span>
      <span style="font-size:9px; color:#9333ea;">● 오더</span>
      <span class="cal-range" id="cal-range">2주</span>
    </div>
  </div>
  <div id="cal-body">
    <div style="text-align:center; color:#aaa; font-size:12px; padding:30px 0;">불러오는 중...</div>
  </div>
</div>

</div>

<script>
let inflowData = [];
let payOrderData = [];
let salesData = [];
let rateData = [];
let sourceData = [];
let currentTab = 0;
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCsXJM18PpCJdk7ajik__XSEB6lgOmahUdTeXT_bKqr52VadEMP_BnNLg0oDdpQA-slQ14TNSkfXxn/pub?gid=1438610573&single=true&output=csv';
const SCHEDULE_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCsXJM18PpCJdk7ajik__XSEB6lgOmahUdTeXT_bKqr52VadEMP_BnNLg0oDdpQA-slQ14TNSkfXxn/pub?gid=1384080283&single=true&output=csv';

async function loadAll() {
  await Promise.all([loadData(), loadSchedule()]);
}

async function loadData() {
  try {
    document.getElementById('updated').textContent = '불러오는 중...';
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const allRows = text.trim().split('\n').map(r => r.split(',').map(c => c.trim()));
    
    inflowData   = allRows.slice(1, 4);
    payOrderData = allRows[6];
    salesData    = allRows.slice(9, 12);
    rateData     = allRows[14];
    sourceData   = allRows.slice(17, 19);
    
    render();
    
    if (salesData[0]) document.getElementById('sales-month').textContent = salesData[0][1] || '-';
    if (salesData[1]) document.getElementById('sales-last').textContent = salesData[1][1] || '-';
    if (salesData[2]) document.getElementById('sales-all').textContent = salesData[2][1] || '-';
    if (rateData) document.getElementById('rate-month').textContent = rateData[1] || '-';
    if (sourceData[0]) document.getElementById('src-ara').textContent = (sourceData[0][1]||'0') + ' / ' + (sourceData[0][2]||'0');
    if (sourceData[1]) document.getElementById('src-odi').textContent = (sourceData[1][1]||'0') + ' / ' + (sourceData[1][2]||'0');
    
    const now = new Date();
    document.getElementById('updated').textContent = '업데이트: ' + now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.getElementById('updated').textContent = '로드 실패';
  }
}

function setTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  render();
}

function render() {
  const col = currentTab + 1;
  inflowData.forEach((row, i) => {
    const el = document.getElementById('v'+i);
    if (el && row[col] !== undefined) el.textContent = row[col];
  });
  if (payOrderData && payOrderData[col] !== undefined) {
    document.getElementById('v3').textContent = payOrderData[col];
  }
}

// ===== 캘린더 =====
async function loadSchedule() {
  const body = document.getElementById('cal-body');
  try {
    const res = await fetch(SCHEDULE_CSV_URL);
    const text = await res.text();
    const rows = text.trim().split('\n').map(r => r.split(',').map(c => c.trim()));
    rows.shift(); // 헤더 제거
    
    const events = rows
      .filter(r => r[0])
      .map(r => ({ 
        date: r[0], 
        time: r[1] || '', 
        name: r[2] || '', 
        grade: r[3] || '',
        type: r[4] || 'visit',
        sales: r[5] || ''
      }));
    
    renderCalendar(events);
  } catch(e) {
    body.innerHTML = '<div style="text-align:center; color:#ea4335; font-size:12px; padding:30px 0;">일정 로드 실패</div>';
  }
}

function renderCalendar(events) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  // 이번 주 월요일 찾기
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  
  // 2주치 = 14일
  const dayNames = ['일','월','화','수','목','금','토'];
  const todayStr = formatDate(today);
  
  // 날짜별 이벤트 그룹
  const eventsByDate = {};
  events.forEach(e => {
    if (!eventsByDate[e.date]) eventsByDate[e.date] = [];
    eventsByDate[e.date].push(e);
  });
  
  let html = '';
  
  // 2주 (각 주 7일)
  for (let week = 0; week < 2; week++) {
    html += '<div class="cal-week">';
    for (let d = 0; d < 7; d++) {
      const day = new Date(monday);
      day.setDate(monday.getDate() + week * 7 + d);
      const dStr = formatDate(day);
      const dayDow = day.getDay();
      
      const isToday = dStr === todayStr;
      const isWeekend = dayDow === 0 || dayDow === 6;
      const isPast = day < today;
      
      let classes = 'cal-day';
      if (isToday) classes += ' today';
      if (isWeekend) classes += ' weekend';
      if (isPast && !isToday) classes += ' past';
      
      const dayEvents = eventsByDate[dStr] || [];
      if (dayEvents.length === 0) classes += ' empty';
      
      html += '<div class="' + classes + '">';
      html += '<div class="cal-date">';
      html += '<span class="num">' + (day.getMonth()+1) + '/' + day.getDate() + '</span>';
      html += '<span class="dow">' + dayNames[dayDow] + '</span>';
      html += '</div>';
      
      html += '<div class="cal-events-wrap">';
      dayEvents.forEach(e => {
        const eventClass = e.type === 'order' ? 'cal-event order' : 'cal-event';
        html += '<div class="' + eventClass + '">';
        
        if (e.type === 'order') {
          html += '<span class="cal-event-tag">💰</span>';
          html += '<span class="cal-event-name">' + escapeHtml(e.name) + '</span>';
          if (e.sales) {
            html += '<span class="cal-event-sales">' + escapeHtml(e.sales) + '</span>';
          }
        } else {
          if (e.time) {
            html += '<span class="cal-event-time">' + e.time + '</span>';
          } else {
            html += '<span class="cal-event-time notime">미정</span>';
          }
          html += '<span class="cal-event-name">' + escapeHtml(e.name) + '</span>';
          if (e.grade) {
            html += '<span class="cal-event-grade">' + escapeHtml(shortGrade(e.grade)) + '</span>';
          }
        }
        
        html += '</div>';
      });
      html += '</div>';
      
      html += '</div>';
    }
    html += '</div>';
  }
  
  document.getElementById('cal-body').innerHTML = html;
  
  // 범위 라벨
  const last = new Date(monday);
  last.setDate(monday.getDate() + 13);
  const rangeLabel = (monday.getMonth()+1) + '/' + monday.getDate() + ' ~ ' + (last.getMonth()+1) + '/' + last.getDate();
  document.getElementById('cal-range').textContent = rangeLabel;
}

function shortGrade(g) {
  // "초등_4~6학년" → "초4~6", "중학생" → "중", "고등학생" → "고"
  if (g.includes('초등')) {
    const m = g.match(/(\d.*\d)|(\d)/);
    return m ? '초' + m[0] : '초';
  }
  if (g.includes('중')) return '중';
  if (g.includes('고')) return '고';
  return g;
}

function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadAll();
</script>
</body>
</html>
