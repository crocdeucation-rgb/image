<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고 소재</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
body { background: #f8f9fa; padding: 16px; }
.section-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 12px; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.grid-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; display: block; }
.grid-item p { font-size: 11px; color: #666; text-align: center; margin-top: 5px; }
.carousel { display: none; position: relative; }
.track-wrap { overflow: hidden; border-radius: 12px; }
.track { display: flex; transition: transform 0.3s ease; }
.slide { min-width: 100%; }
.slide img { width: 100%; height: 200px; object-fit: contain; border-radius: 12px; background: #f8f9fa; display: block; }
.slide-label { text-align: center; font-size: 13px; color: #555; margin-top: 8px; font-weight: 500; }
.btn { position: absolute; top: 120px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; color: #333; z-index: 10; }
.btn-prev { left: 8px; }
.btn-next { right: 8px; }
.dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; cursor: pointer; transition: background 0.2s; }
.dot.active { background: #1a73e8; }
@media (max-width: 600px) {
  .grid { display: none; }
  .carousel { display: block; }
}
</style>
</head>
<body>

<p class="section-title">광고 소재 현황</p>

<div class="grid">
  <div class="grid-item">
    <img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260501_173119427.png" />
    <p>학습관리 무료컨설팅</p>
  </div>
  <div class="grid-item">
    <img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260501_173008241.png" />
    <p>중간고사 이후가 중요</p>
  </div>
  <div class="grid-item">
    <img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260501_172952760.png" />
    <p>스스로 해야하는 학습관</p>
  </div>
  <div class="grid-item">
    <img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260501_172936432.png" />
    <p>1:1과외보다 아라온스쿨</p>
  </div>
  <div class="grid-item">
    <img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260430_182543576_04.png" />
    <p>새 잠재 고객 광고</p>
  </div>
  <div class="grid-item">
  <img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260503_141125052.png" />
  <p>학습관리컨설팅2</p>
  </div>
  <div class="grid-item">
  <img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260430_182543576_06.png" />
  <p>맞춤 웹 트래픽 캠페인 05.06</p>
</div>
  
</div>

<div class="carousel">
  <div class="track-wrap">
    <div class="track" id="track">
      <div class="slide"><img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260501_173119427.png" /><p class="slide-label">학습관리 무료컨설팅</p></div>
      <div class="slide"><img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260501_173008241.png" /><p class="slide-label">중간고사 이후가 중요</p></div>
      <div class="slide"><img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260501_172952760.png" /><p class="slide-label">스스로 해야하는 학습관</p></div>
      <div class="slide"><img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260501_172936432.png" /><p class="slide-label">1:1과외보다 아라온스쿨</p></div>
      <div class="slide"><img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260430_182543576_04.png" /><p class="slide-label">새 잠재 고객 광고</p></div>
      <div class="slide"><img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260503_141125052.png" /><p class="slide-label">학습관리컨설팅2</p></div>
      <div class="slide"><img src="https://raw.githubusercontent.com/crocdeucation-rgb/image/main/KakaoTalk_20260430_182543576_06.png" /><p class="slide-label">맞춤 웹 트래픽 캠페인 05.06</p></div>
    </div>
  </div>
  <button class="btn btn-prev" onclick="move(-1)">&#8249;</button>
  <button class="btn btn-next" onclick="move(1)">&#8250;</button>
  <div class="dots" id="dots"></div>
</div>

<script>
let cur = 0;
const total = 7;
const track = document.getElementById('track');
const dotsEl = document.getElementById('dots');
for (let i = 0; i < total; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' active':'');
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
}
function goTo(n) {
  cur = (n + total) % total;
  track.style.transform = `translateX(-${cur*100}%)`;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===cur));
}
function move(dir) { goTo(cur + dir); }
  // 터치 스와이프
const wrap = document.querySelector('.track-wrap');
let startX = 0;
wrap.addEventListener('touchstart', e => startX = e.touches[0].clientX);
wrap.addEventListener('touchend', e => {
  const diff = startX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) move(diff > 0 ? 1 : -1);
});
</script>
</body>
</html>
